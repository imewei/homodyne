name: Code Quality

on:
  push:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 3 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

env:
  JAX_ENABLE_X64: "1"
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1
  # pytest-qt (transitive dep via nlsq) needs a Qt platform plugin;
  # offscreen avoids requiring a display server on headless CI runners.
  QT_QPA_PLATFORM: offscreen

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run Bandit security scan
        run: |
          uvx bandit -r homodyne/ \
            -c pyproject.toml \
            -f json \
            -o bandit-report.json \
            -ll; BANDIT_EXIT=$?
          # Display human-readable output from the saved report
          python3 -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          for r in data.get('results', []):
              print(f\"{r['filename']}:{r['line_number']}: {r['issue_severity']}/{r['issue_confidence']} {r['issue_text']}\")
          metrics = data.get('metrics', {}).get('_totals', {})
          print(f\"Issues: {metrics.get('SEVERITY.HIGH', 0)} high, {metrics.get('SEVERITY.MEDIUM', 0)} medium, {metrics.get('SEVERITY.LOW', 0)} low\")
          "
          exit $BANDIT_EXIT

      - name: Check dependency vulnerabilities
        run: |
          uv export --no-dev --format requirements-txt > /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get install -y shellcheck
          fi
          shellcheck -S warning homodyne/runtime/shell/completion.sh
          shellcheck -S warning homodyne/runtime/shell/activation/xla_config.bash

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run mypy
        run: |
          uv run mypy homodyne/ \
            --config-file=pyproject.toml \
            --show-error-codes \
            --pretty

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Qt runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: |
          uv run pytest tests/unit/ tests/regression/ tests/api/ \
            -o "addopts=-ra --strict-markers --strict-config --durations=10" \
            --cov=homodyne \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            -n 2 \
            -m "not slow"
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: quality
          fail_ci_if_error: false

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [security, shellcheck, type-check, coverage]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Scan:** ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Shell Scripts:** ${{ needs.shellcheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Type Checking:** ${{ needs.type-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Test Coverage:** ${{ needs.coverage.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Quality checks complete. See artifacts for detailed reports._" >> $GITHUB_STEP_SUMMARY
