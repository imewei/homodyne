# Read the Docs configuration file for Homodyne
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  apt_packages:
    - texlive-xetex
    - texlive-fonts-recommended
    - fonts-dejavu
    - lmodern

python:
  install:
    - method: pip
      path: .

sphinx:
  configuration: docs/source/conf.py
  # Allow warnings during build (intersphinx offline, etc.)
  fail_on_warning: false

formats:
  - pdf
  - epub

# Submodules (if any)
submodules:
  include: []
  recursive: false
